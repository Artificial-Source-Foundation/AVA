name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make AVA better? Describe it below.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What's frustrating or missing today?
      placeholder: "I often need to ... but currently AVA doesn't ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should it work? Be as specific as you like.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought about?

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of AVA does this affect?
      options:
        - TUI
        - Desktop app
        - Web UI
        - Agent / LLM
        - Tools
        - Plugins / MCP
        - Multi-agent (Praxis)
        - Config / Setup
        - CLI flags
        - Other

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, mockups, links to similar features in other tools, etc.
