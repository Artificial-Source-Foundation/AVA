name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

env:
  CARGO_INCREMENTAL: 0

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # C++ Milestone 1 contract-freeze governance guard
  # ---------------------------------------------------------------------------
  cpp-m1-freeze-guard:
    name: C++ M1 Freeze Guard
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify C++ Milestone 1 freeze governance
        env:
          AVA_CPP_M1_FREEZE_LIFT: ${{ contains(github.event.pull_request.labels.*.name, 'freeze-lift') && '1' || '0' }}
        run: bash scripts/dev/verify-cpp-m1-freeze.sh "${{ github.event.pull_request.base.sha }}...${{ github.sha }}"

  # ---------------------------------------------------------------------------
  # Combined JS/TS checks (saves 3 separate runner startups)
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend (Lint + Types + Test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome check
        run: pnpm biome check .

      - name: Oxlint
        run: pnpm run lint

      - name: TypeScript
        run: pnpm run typecheck

      - name: Tests
        run: pnpm run test:run

  # ---------------------------------------------------------------------------
  # Deterministic browser parity smoke (minimal web-mode CI coverage)
  # ---------------------------------------------------------------------------
  browser-parity:
    name: Browser Parity (Web Mode Smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run deterministic web-mode browser smoke
        run: pnpm test:e2e -- --project=chromium --workers=1 --retries=0 e2e/web-mode.spec.ts --grep "frontend with the live web backend renders the chat UI"

  # ---------------------------------------------------------------------------
  # Combined Rust checks (saves 3 separate runner startups)
  # ---------------------------------------------------------------------------
  rust:
    name: Rust (Fmt + Clippy + Test + Doc)
    runs-on: ubuntu-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop' }}

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Run tests
        run: cargo nextest run --workspace --profile ci

      - name: Build docs
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --workspace --no-deps

  # ---------------------------------------------------------------------------
  # C++ migration tree smoke (configure + build + ctest)
  # ---------------------------------------------------------------------------
  cpp:
    name: C++ (CMake + CTest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned CMake
        run: |
          cmake_path="$(AVA_BOOTSTRAP_CMAKE=1 bash scripts/dev/ensure-cmake.sh)"
          echo "$(dirname "$cmake_path")" >> "$GITHUB_PATH"

      - name: Install C++ dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libsqlite3-dev

      - name: Configure CMake
        run: cmake --preset cpp-release
        working-directory: cpp

      - name: Build C++ targets
        run: cmake --build --preset cpp-release
        working-directory: cpp

      - name: Run C++ tests
        run: ctest --preset cpp-release --output-on-failure
        working-directory: cpp

      - name: Smoke C++ apps
        run: |
          ../build/cpp/release/apps/ava_cli --version
          ../build/cpp/release/apps/ava_cli --smoke
          ../build/cpp/release/apps/ava_smoke
        working-directory: cpp

      - name: Configure C++ warnings-as-errors
        run: cmake --preset cpp-werror
        working-directory: cpp

      - name: Build C++ warnings-as-errors
        run: cmake --build --preset cpp-werror
        working-directory: cpp

      - name: Run C++ warnings-as-errors tests
        run: ctest --preset cpp-werror --output-on-failure
        working-directory: cpp

      - name: Configure C++ sanitizer
        run: cmake --preset cpp-sanitizer
        working-directory: cpp

      - name: Build C++ sanitizer
        run: cmake --build --preset cpp-sanitizer
        working-directory: cpp

      - name: Run C++ sanitizer tests
        run: ctest --preset cpp-sanitizer --output-on-failure
        working-directory: cpp

  # ---------------------------------------------------------------------------
  # Security (lightweight, no build needed for audit)
  # ---------------------------------------------------------------------------
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run cargo deny
        uses: EmbarkStudios/cargo-deny-action@v2

  # ---------------------------------------------------------------------------
  # Spell check (very fast, no deps)
  # ---------------------------------------------------------------------------
  typos:
    name: Spell Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: crate-ci/typos@v1

  # ---------------------------------------------------------------------------
  # Desktop/Tauri PR smoke validation (Ubuntu debug, no release bundling)
  # ---------------------------------------------------------------------------
  desktop-smoke:
    name: Desktop Smoke (Ubuntu Debug)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-22.04
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm run build:packages

      - name: Run src-tauri tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --tests

      - name: Tauri debug smoke build (no bundle)
        run: pnpm tauri build --debug --no-bundle

  # ---------------------------------------------------------------------------
  # Desktop build (only on master push, not PRs — saves the most minutes)
  # ---------------------------------------------------------------------------
  build:
    name: Build (${{ matrix.platform }})
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop')
    needs: [frontend, rust]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup MSVC dev environment
        if: matrix.platform == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Force MSVC for C/C++ compilation
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          echo "CC=cl.exe" >> "$GITHUB_ENV"
          echo "CXX=cl.exe" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm run build:packages

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }}
