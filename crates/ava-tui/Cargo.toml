[package]
name = "ava-tui"
description = "Terminal user interface for the AVA CLI"
version.workspace = true
edition.workspace = true

[[bin]]
name = "ava"
path = "src/main.rs"

[[bin]]
name = "ava-smoke"
path = "src/bin/smoke.rs"

[dependencies]
ratatui = "0.29"
crossterm = { version = "0.28", features = ["event-stream"] }
tokio = { version = "1", features = ["full"] }
tokio-stream = "0.1"
tokio-util = "0.7"
futures = "0.3"
pulldown-cmark = "0.12"
syntect = { version = "5", default-features = false, features = ["default-fancy"] }
similar = { version = "2", features = ["unicode"] }
nucleo = "0.5"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
ava-agent = { path = "../ava-agent" }
ava-commander = { path = "../ava-commander" }
ava-llm = { path = "../ava-llm" }
ava-tools = { path = "../ava-tools" }
ava-session = { path = "../ava-session" }
ava-memory = { path = "../ava-memory" }
ava-permissions = { path = "../ava-permissions" }
ava-config = { path = "../ava-config" }
ava-auth = { path = "../ava-auth" }
ava-platform = { path = "../ava-platform" }
ava-context = { path = "../ava-context" }
ava-types = { path = "../ava-types" }
ava-db = { path = "../ava-db" }
ava-codebase = { path = "../ava-codebase" }
cpal = { version = "0.15", optional = true }
hound = { version = "3.5", optional = true }
whisper-rs = { version = "0.12", optional = true }
async-trait = { version = "0.1", optional = true }
reqwest = { version = "0.12", features = ["json", "multipart"], optional = true }
clap = { version = "4", features = ["derive"] }
serde_yaml.workspace = true
color-eyre = "0.6"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tracing-appender = "0.2"
uuid = { version = "1", features = ["v4", "serde"] }
chrono = "0.4"
dirs = "5"
unicode-width = "0.2"
tempfile = "3"

[features]
default = []
voice = ["dep:cpal", "dep:hound", "dep:async-trait", "dep:reqwest"]
local-whisper = ["voice", "dep:whisper-rs"]

[dev-dependencies]
insta = "1"
