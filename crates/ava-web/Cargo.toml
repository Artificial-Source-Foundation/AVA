[package]
name = "ava-web"
description = "Standalone web server surface for AVA"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true

[lints]
workspace = true

[dependencies]
ava-acp = { path = "../ava-acp" }
ava-agent = { path = "../ava-agent" }
ava-agent-orchestration = { path = "../ava-agent-orchestration" }
ava-config = { path = "../ava-config" }
ava-control-plane = { path = "../ava-control-plane" }
ava-context = { path = "../ava-context" }
ava-db = { path = "../ava-db" }
ava-llm = { path = "../ava-llm" }
ava-plugin = { path = "../ava-plugin" }
ava-session = { path = "../ava-session" }
ava-tools = { path = "../ava-tools" }
ava-types = { path = "../ava-types" }
async-trait = "0.1"
axum = { version = "0.8", features = ["ws"] }
chrono = "0.4"
color-eyre = "0.6"
futures = "0.3"
reqwest.workspace = true
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
tokio-util.workspace = true
tower-http = { version = "0.6", features = ["cors", "trace"] }
tracing = "0.1"
uuid = { version = "1", features = ["v4", "serde"] }

[dev-dependencies]
tempfile = "3"
tower = { version = "0.5", features = ["util"] }
