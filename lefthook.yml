# Lefthook - Git hooks manager
# https://github.com/evilmartians/lefthook

# Source shell config to get nvm/fnm/asdf in PATH
rc: ~/.bashrc

pre-commit:
  commands:
    staged-local-checks:
      run: bash scripts/dev/git-hooks.sh pre-commit

pre-push:
  commands:
    local-confidence-gate:
      run: bash scripts/dev/git-hooks.sh pre-push
      skip:
        - merge
        - rebase

commit-msg:
  commands:
    commitlint:
      run: npx commitlint --edit {1}
